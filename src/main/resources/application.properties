spring.application.name=soundboard

server.port=8080

###### POSTGRESQL DATABASE CONFIG
#spring.datasource.url=jdbc:postgresql://localhost:5432/soundboard
#spring.datasource.username=postgres
#spring.datasource.password=1234
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
#create or update tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

###### SECURITY DEBUG LOGGING
logging.level.org.springframework.security=DEBUG

###### MISC
#if the input json to the endpoint does not have the exact structure then the call is rejected.
spring.jackson.deserialization.fail-on-unknown-properties=true

spring.servlet.multipart.max-file-size=10MB
#configure the directory to store sound files
app.sounds.directory=./sounds

# JWT signing secret. In production set JWT_SECRET env var.
app.jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1mb3ItZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9u}

# CORS — override in prod with the actual frontend origin
app.cors.allowed-origins=http://localhost:3000

# Admin configuration
app.admin.force-password-change=false
