spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.org.springframework.security=WARN

security.require-https=true

app.jwt.secret=${JWT_SECRET}

# Admin configuration
app.admin.force-password-change=true

# Bootstrap SUPER_ADMIN — mandatory in prod; startup fails if either is missing.
app.bootstrap.username=${APP_BOOTSTRAP_USERNAME}
app.bootstrap.password=${APP_BOOTSTRAP_PASSWORD}
